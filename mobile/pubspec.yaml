name: crosssync
description: CrossSync — Cross-Platform Productivity Suite
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Supabase realtime
  supabase_flutter: ^2.5.0

  # Calendar UI
  table_calendar: ^3.1.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  intl: ^0.19.0

  # Drag and drop for Kanban
  flutter_reorderable_grid_view: ^3.0.1

  # PDF viewer
  flutter_pdfview: ^1.3.2

  # Push notifications
  flutter_local_notifications: ^17.1.2

  # Utils
  uuid: ^4.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
