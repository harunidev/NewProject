version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./crosssync.db
      - SECRET_KEY=change-this-in-production-min-32-chars
      - DEBUG=false
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
